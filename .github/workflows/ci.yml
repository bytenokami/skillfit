name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [22, 24]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - name: typecheck
        run: npm run typecheck

      - name: test
        run: npm test

      - name: build
        run: npm run build

      - name: smoke help
        run: node dist/cli.js --help

      - name: smoke init + review + check on fixture
        shell: bash
        run: |
          set -euo pipefail
          tmp=$(mktemp -d)
          cp -r test/fixtures/sample-repo/* "$tmp"/
          cp -r test/fixtures/sample-repo/.[!.]* "$tmp"/ 2>/dev/null || true
          node dist/cli.js init --cwd "$tmp"
          # check before approval should fail
          if node dist/cli.js check --cwd "$tmp"; then
            echo "expected check to fail before approval, but it passed"
            exit 1
          fi
          node dist/cli.js review --cwd "$tmp" --yes
          node dist/cli.js check --cwd "$tmp"

  publish-dry-run:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - run: npm publish --dry-run
